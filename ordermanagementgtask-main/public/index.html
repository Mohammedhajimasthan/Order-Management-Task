<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { DEFAULT: '#6366f1', dark: '#4f46e5' } } } }
    };
  </script>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="/favicon.ico" />
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 flex items-center justify-center p-4">

  <!-- Login Card -->
  <div class="w-full max-w-md fade-in">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 shadow-lg mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Admin Dashboard</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 p-8">
      <!-- Tabs -->
      <div class="flex rounded-xl bg-slate-100 dark:bg-slate-700 p-1 mb-6">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-white dark:bg-slate-600 text-slate-900 dark:text-white shadow-sm">
          Sign In
        </button>
        <button id="tab-signup" onclick="switchTab('signup')"
          class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-slate-500 dark:text-slate-400">
          Sign Up
        </button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email</label>
          <input type="email" name="email" required placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
          <div class="relative">
            <input type="password" id="login-password" name="password" required placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 pr-12" />
            <button type="button" onclick="togglePassword('login-password')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors shadow-sm">
          Sign In
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Full Name</label>
          <input type="text" name="displayName" required placeholder="John Doe"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email</label>
          <input type="email" name="email" required placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
          <input type="password" id="signup-password" name="password" required placeholder="At least 6 characters"
            class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400" />
        </div>
        <button type="submit"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors shadow-sm">
          Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-slate-600"></div></div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-white dark:bg-slate-800 px-3 text-slate-400">or continue with</span>
        </div>
      </div>

      <!-- Google -->
      <button id="google-btn"
        class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-slate-300 dark:border-slate-600 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-slate-700 dark:text-slate-300 font-medium">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      Protected by Firebase Authentication
    </p>
  </div>

  <script type="module">
    import { initDarkMode, showToast, showLoading, hideLoading } from '/js/ui.js';
    import { loginWithEmail, signupWithEmail, loginWithGoogle, redirectIfLoggedIn } from '/js/auth.js';

    initDarkMode();
    redirectIfLoggedIn('/dashboard.html');

    window.switchTab = (tab) => {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('hidden', !isLogin);
      document.getElementById('signup-form').classList.toggle('hidden', isLogin);

      const activeStyle = 'bg-white dark:bg-slate-600 text-slate-900 dark:text-white shadow-sm';
      const inactiveStyle = 'text-slate-500 dark:text-slate-400';

      document.getElementById('tab-login').className = `flex-1 py-2 text-sm font-medium rounded-lg transition-all ${isLogin ? activeStyle : inactiveStyle}`;
      document.getElementById('tab-signup').className = `flex-1 py-2 text-sm font-medium rounded-lg transition-all ${!isLogin ? activeStyle : inactiveStyle}`;
    };

    window.togglePassword = (id) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = e.target.email.value;
      const password = e.target.password.value;
      showLoading('Signing in...');
      try {
        await loginWithEmail(email, password);
        window.location.href = '/dashboard.html';
      } catch (err) {
        hideLoading();
        showToast(friendlyError(err.code), 'error');
      }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { displayName, email, password } = Object.fromEntries(new FormData(e.target));
      showLoading('Creating account...');
      try {
        await signupWithEmail(email, password, displayName);
        window.location.href = '/dashboard.html';
      } catch (err) {
        hideLoading();
        showToast(friendlyError(err.code), 'error');
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      showLoading('Connecting with Google...');
      try {
        await loginWithGoogle();
        window.location.href = '/dashboard.html';
      } catch (err) {
        hideLoading();
        showToast(friendlyError(err.code), 'error');
      }
    });

    function friendlyError(code) {
      const map = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/weak-password': 'Password must be at least 6 characters.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/popup-closed-by-user': 'Sign-in popup was closed.',
        'auth/too-many-requests': 'Too many attempts. Please try later.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      return map[code] || 'Authentication failed. Please try again.';
    }
  </script>
</body>
</html>
